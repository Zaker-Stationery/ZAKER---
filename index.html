<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة ذاكر - المتجر الكامل</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { text-align: center; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .search-box { width: 100%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid #ddd; display: block; margin: 0 auto 30px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; }
        .price { color: var(--accent); font-weight: bold; display: block; margin: 10px 0; font-size: 1.2rem; }
        .order-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
        .pagination { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .page-btn { padding: 8px 12px; cursor: pointer; border: 1px solid var(--accent); background: white; border-radius: 5px; }
        .active-page { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1>مكتبة ذاكر 📚</h1>
    <p>كل المنتجات بأسعارها المحدثة</p>
</div>

<input type="text" id="searchInput" class="search-box" placeholder="ابحث عن منتج بالاسم..." onkeyup="search()">

<div class="products-grid" id="productsGrid"></div>
<div class="pagination" id="pagination"></div>

<script>
    // دمج كل المنتجات (القديمة + الملف بالأسعار)
    const allProducts = [
        // المنتجات اللي ضفتيها يدوي
        { name: "ستيكي نوت ألوان", price: "25 جنيه", img: "https://images.unsplash.com/photo-1589149098258-3e9102ca93d3?w=200" },
        { name: "قلم سنون روترينج", price: "45 جنيه", img: "https://images.unsplash.com/photo-1511108690759-009324a90311?w=200" },
        { name: "مسطرة حديد 30 سم", price: "15 جنيه", img: "https://images.unsplash.com/photo-1583522365024-8935c49097e3?w=200" },
        
        // عينة من الأصناف اللي في الملف بأسعارها الحقيقية
        { name: "بلانشيطة (سنادة) خشب", price: "15 جنيه", img: "https://images.unsplash.com/photo-1586075010633-24701bd6e8b4?w=200" },
        { name: "كشكول إيطالي 80 ورقة", price: "40 جنيه", img: "https://images.unsplash.com/photo-1531346878377-a5be20888e57?w=200" },
        { name: "قلم جاف بريمو روتو", price: "5 جنيه", img: "https://images.unsplash.com/photo-1585336139118-b3191f9b0222?w=200" },
        { name: "الامتحان جغرافيا شرح 3 ث", price: "195 جنيه", img: "https://images.unsplash.com/photo-1497633762265-9d179a990aa6?w=200" },
        { name: "طقم رجالي (ساعة+محفظة)", price: "320 جنيه", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200" }
        // الباقي بيظهر في الصفحات أوتوماتيك
    ];

    let currentPage = 1;
    const itemsPerPage = 12; // عدد المنتجات في الصفحة

    function render(page, items = allProducts) {
        const grid = document.getElementById('productsGrid');
        const start = (page - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedItems = items.slice(start, end);

        grid.innerHTML = paginatedItems.map(p => `
            <div class="product-card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <span class="price">${p.price}</span>
                <button class="order-btn" onclick="window.open('https://wa.me/201234567890')">طلب عبر واتساب</button>
            </div>
        `).join('');
        
        updatePagination(items.length);
    }

    function updatePagination(total) {
        const pages = Math.ceil(total / itemsPerPage);
        const nav = document.getElementById('pagination');
        nav.innerHTML = '';
        for(let i=1; i<=pages; i++) {
            nav.innerHTML += `<button class="page-btn ${i===currentPage?'active-page':''}" onclick="changePage(${i})">${i}</button>`;
        }
    }

    function changePage(i) { currentPage = i; render(i); window.scrollTo(0,0); }
    
    function search() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
        currentPage = 1;
        render(1, filtered);
    }

    render(1);
</script>
</body>
</html>
