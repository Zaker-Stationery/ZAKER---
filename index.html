<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAKER - مكتبة ذاكر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, var(--p), var(--s)); color: #fff; padding: 15px; text-align: center; }
        .logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; background: #fff; margin-bottom: 5px; }
        .container { padding: 10px; max-width: 1000px; margin: auto; }
        .category-title { border-right: 4px solid var(--s); padding-right: 10px; margin: 15px 0; color: var(--p); font-size: 1.1rem; text-align: right; }
        
        /* شبكة المنتجات */
        #products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        .card { background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; height: 100%; box-sizing: border-box;}
        .img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 8px; border-radius: 8px; }
        .name { font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; min-height: 35px; color: #333; display: flex; align-items: center; justify-content: center; }
        .price { color: #27ae60; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .label { display: block; text-align: right; font-size: 0.7rem; margin-bottom: 2px; color: #666; font-weight: bold; }
        
        select { width: 100%; padding: 4px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 8px; font-family: 'Cairo'; font-size: 0.75rem; }
        .btn { background: var(--a); color: #fff; border: none; padding: 10px 2px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 0.8rem; text-decoration: none; margin-top: auto; }

        /* أزرار الصفحات */
        .pagination { display: flex; justify-content: center; gap: 5px; margin: 20px 0; flex-wrap: wrap; }
        .pagination button { background: #fff; border: 1px solid var(--s); color: var(--s); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; }
        .pagination button.active { background: var(--s); color: #fff; }

        .service-card { background: #fff; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; border-right: 5px solid var(--s); }
        .service-btn { background: var(--s); color: #fff; padding: 10px; border-radius: 8px; display: block; text-decoration: none; font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/JjGYxZSd/logo.png" class="logo">
    <h1 style="font-size: 1.2rem; margin: 0;">مكتبة ذاكر - ZAKER</h1>
</header>

<div class="container">
    <h2 class="category-title">قسم الأدوات والكتب</h2>
    
    <div id="products-grid"></div>

    <div class="pagination" id="pagination"></div>

    <h2 class="category-title">خدمات إضافية</h2>
    <div class="service-card">
        <div style="font-weight: bold; color: var(--p);">📸 تصوير ومستندات</div>
        <a href="https://wa.me/201027021011" class="service-btn">استفسار واتساب</a>
    </div>
</div>

<script>
    // قائمة المنتجات (هنا بنحط الـ 880 منتج بتوعنا)
    const allProducts = [
        { name: "استيكي نوت فواصل", img: "https://i.ibb.co/6RnvW32C/image.jpg", variants: [{label: "عادي", price: 10}] },
        { name: "صلصال فوم دستة", img: "https://i.ibb.co/dwvfDC7S/image.jpg", variants: [{label: "12 قطعة", price: 20}] },
        { name: "كتاب المعاصر Math 1 ابتدائي", img: "https://elmoasserbooks.com/wp-content/uploads/2023/08/math-cover.png", variants: [{label: "تيرم 1", price: 150}, {label: "تيرم 2", price: 150}] },
        { name: "ألوان خشب فابر كاستل", img: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=200", variants: [{label: "12 لون", price: 85}, {label: "24 لون", price: 160}] },
        { name: "قلم سنون روترينج 0.5", img: "https://images.unsplash.com/photo-1511108690759-009324a90311?w=200", variants: [{label: "أصلي", price: 45}] },
        { name: "زمزمية تانك 1 لتر", img: "https://images.unsplash.com/photo-1523362628744-0c14a394bc85?w=200", variants: [{label: "موف", price: 95}, {label: "أزرق", price: 95}] },
        // ... سأرسل لك باقي المنتجات في الرسائل القادمة لتضيفيها هنا
    ];

    const itemsPerPage = 12; // عدد المنتجات في كل صفحة
    let currentPage = 1;

    function renderProducts(page) {
        const start = (page - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedItems = allProducts.slice(start, end);
        
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';

        paginatedItems.forEach((product, index) => {
            let selectHTML = '';
            if (product.variants.length > 1) {
                selectHTML = `<label class="label">اختر النوع:</label>
                              <select onchange="updatePrice(this, ${start + index})">
                                ${product.variants.map(v => `<option value="${v.price}">${v.label} - ${v.price}ج</option>`).join('')}
                              </select>`;
            }

            grid.innerHTML += `
                <div class="card">
                    <img src="${product.img}" class="img">
                    <div class="name">${product.name}</div>
                    <div class="price" id="price-${start + index}">${product.variants[0].price} ج.م</div>
                    ${selectHTML}
                    <button onclick="sendOrder('${product.name}', ${start + index})" class="btn">طلب واتساب</button>
                </div>
            `;
        });
        renderPagination();
    }

    function updatePrice(select, globalIndex) {
        document.getElementById(`price-${globalIndex}`).innerText = select.value + " ج.م";
    }

    function renderPagination() {
        const totalPages = Math.ceil(allProducts.length / itemsPerPage);
        const paginationDiv = document.getElementById('pagination');
        paginationDiv.innerHTML = '';

        for (let i = 1; i <= totalPages; i++) {
            paginationDiv.innerHTML += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
    }

    function goToPage(i) {
        currentPage = i;
        renderProducts(i);
        window.scrollTo(0,0);
    }

    function sendOrder(name, index) {
        let priceElement = document.getElementById(`price-${index}`).innerText;
        let message = encodeURIComponent(`أهلاً مكتبة ذاكر، أريد طلب: ${name} بسعر ${priceElement}`);
        window.open(`https://wa.me/201027021011?text=${message}`);
    }

    // ابدأ التشغيل
    renderProducts(1);
</script>

</body>
</html>
