        header { background: linear-gradient(135deg, var(--p), var(--s)); color: #fff; padding: 15px; text-align: center; }

        .container { padding: 10px; max-width: 1000px; margin: auto; }
        .category-title { border-right: 4px solid var(--s); padding-right: 10px; margin: 15px 0; color: var(--p); font-size: 1.1rem; text-align: right; }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; }
        .img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 8px; border-radius: 8px; }
        .name { font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; min-height: 35px; color: #333; display: flex; align-items: center; justify-content: center; }
        .price { color: #27ae60; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .label { display: block; text-align: right; font-size: 0.7rem; margin-bottom: 2px; color: #666; font-weight: bold; }
        
        select { width: 100%; padding: 4px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 8px; font-family: 'Cairo'; font-size: 0.75rem; }
        .btn { background: var(--a); color: #fff; border: none; padding: 10px 2px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 0.8rem; text-decoration: none; margin-top: auto; }

        .pagination { display: flex; justify-content: center; gap: 5px; margin: 20px 0; flex-wrap: wrap; }
        .pagination button { background: #fff; border: 1px solid var(--s); color: var(--s); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; }
        .pagination button.active { background: var(--s); color: #fff; }

        .service-card { background: #fff; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; border-right: 5px solid var(--s); }
        .service-btn { background: var(--s); color: #fff; padding: 10px; border-radius: 8px; display: block; text-decoration: none; font-weight: bold; margin-top: 10px; font-size: 0.9rem; }

function searchProducts() {
    const term = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
    renderProducts(filtered, 1);
}

const itemsPerPage = 12;
let currentPage = 1;
const defaultImg = "https://i.ibb.co/JjGYxZSd/logo.png";

function renderProducts(products, page) {
    const grid = document.getElementById('products-grid');
    if (!grid) return;
    grid.innerHTML = '';

    const start = (page - 1) * itemsPerPage;
    const items = products.slice(start, start + itemsPerPage);

    items.forEach((p) => {
        const imageSrc = (p.img && p.img.trim() !== '') ? p.img : defaultImg;
        
        let displayPrice = '';
        if (p.price) {
            displayPrice = p.price;
        } else if (p.variants && p.variants.length > 0) {
            displayPrice = p.variants[0].price;
        }

        let selectBox = '';
        if (p.variants && p.variants.length > 0) {
            selectBox = `
                <label class="label">اختار:</label>
                <select onchange="updatePrice(this, '${p.name.replace(/\s+/g, '')}')">
                    ${p.variants.map(v => `<option value="${v.price}">${v.label} - ${v.price} ج.م</option>`).join('')}
                </select>
            `;
        }

        grid.innerHTML += `
            <div class="card">
                <img src="${imageSrc}" class="product-img">
                <div class="name">${p.name}</div>
                <div class="price" id="price-${p.name.replace(/\s+/g, '')}">${displayPrice ? displayPrice + ' ج.م' : ''}</div>
                ${selectBox}
                <button onclick="order('${p.name.replace(/'/g, "\\'")}', '${p.name.replace(/\s+/g, '')}')">اطلب عبر واتساب</button>
            </div>
        `;
    });

    renderPagination(products.length, page);
}

function updatePrice(selectElement, productId) {
    const priceDiv = document.getElementById('price-' + productId);
    if (priceDiv) {
        priceDiv.innerText = selectElement.value + ' ج.م';
    }
}
        
function renderPagination(totalItems, currentPageNum) {
    const pagesContainer = document.getElementById('pagination');
    if (!pagesContainer) return;
    pagesContainer.innerHTML = '';

    const totalPages = Math.ceil(totalItems / itemsPerPage);
    if (totalPages <= 1) return;

    for (let i = 1; i <= totalPages; i++) {
        pagesContainer.innerHTML += `
            <button class="${i === currentPageNum ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>
        `;
    }
}

function goToPage(page) {
    currentPage = page;
    renderProducts(allProducts, page);
}
    
function order(name, priceId) {
    let priceElement = document.getElementById('price-' + priceId);
    let currentPrice = priceElement ? priceElement.innerText : '';
    let text = "أهلاً مكتبة ذاكر، أريد طلب: " + name + (currentPrice ? " بسعر " + currentPrice : "");
    let msg = encodeURIComponent(text);
    window.open("https://wa.me/201027021011?text=" + msg);
}
