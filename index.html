<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة ذاكر - المتجر</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .header { text-align: center; background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .search-box { width: 90%; max-width: 400px; padding: 10px; border-radius: 20px; border: 1px solid #ddd; display: block; margin: 0 auto 20px; outline: none; }
        
        /* منتجين في الصف */
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 0 auto; }
        
        .product-card { background: white; border-radius: 12px; padding: 12px; text-align: center; box-shadow: 0 3px 8px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
        .product-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; background: #f9f9f9; }
        .product-card h3 { font-size: 0.85rem; margin: 10px 0 5px; height: 32px; overflow: hidden; line-height: 1.2; }
        
        .options-select { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 8px; font-size: 0.75rem; }
        .price-tag { color: var(--accent); font-weight: bold; font-size: 0.95rem; margin-bottom: 10px; display: block; }
        .order-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 6px; width: 100%; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        
        .pagination { text-align: center; margin: 20px 0; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .page-btn { padding: 5px 10px; cursor: pointer; border: 1px solid var(--accent); background: white; border-radius: 4px; color: var(--accent); font-size: 0.75rem; }
        .active-page { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1>مكتبة ذاكر 📚</h1>
</div>

<input type="text" id="searchInput" class="search-box" placeholder="ابحثي عن منتج..." onkeyup="search()">

<div class="products-grid" id="productsGrid"></div>
<div class="pagination" id="pagination"></div>

<script>
    // المنتجات مع الـ Options وأسعارها الخاصة لكل اختيار
    const allProducts = [
        { 
            name: "مسطرة بلاستيك", 
            img: "https://images.unsplash.com/photo-1583522365024-8935c49097e3?w=200", 
            variants: [
                { label: "20 سم", price: "10 جنيه" },
                { label: "30 سم", price: "15 جنيه" },
                { label: "50 سم", price: "25 جنيه" }
            ]
        },
        { 
            name: "ستيكي نوت ألوان", 
            img: "https://images.unsplash.com/photo-1589149098258-3e9102ca93d3?w=200", 
            variants: [{ label: "مكعب صغير", price: "25 جنيه" }, { label: "مكعب كبير", price: "45 جنيه" }]
        },
        { 
            name: "قلم جاف روتو أبيض", 
            img: "https://images.unsplash.com/photo-1585336139118-b3191f9b0222?w=200", 
            variants: [{ label: "قطعة واحدة", price: "5 جنيه" }, { label: "علبة كاملة", price: "55 جنيه" }]
        },
        // أصناف من ملف الإكسيل بأسعارها
        { name: "بلانشيطه خشب", img: "https://images.unsplash.com/photo-1586075010633-24701bd6e8b4?w=200", variants: [{ label: "عادي", price: "15 جنيه" }] },
        { name: "كشكول ايطالي 80 ورقه", img: "https://images.unsplash.com/photo-1531346878377-a5be20888e57?w=200", variants: [{ label: "مسطر", price: "40 جنيه" }] },
        { name: "الامتحان جغرافيا 3 ث", img: "https://images.unsplash.com/photo-1497633762265-9d179a990aa6?w=200", variants: [{ label: "شرح", price: "195 جنيه" }] },
        { name: "طقم ساعة ومحفظة", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200", variants: [{ label: "رجالي شيك", price: "320 جنيه" }] }
    ];

    let currentPage = 1;
    const itemsPerPage = 8;

    function render(page, items = allProducts) {
        const grid = document.getElementById('productsGrid');
        const start = (page - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedItems = items.slice(start, end);

        grid.innerHTML = paginatedItems.map((p, index) => `
            <div class="product-card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <select class="options-select" onchange="updatePrice(this, ${start + index})">
                    ${p.variants.map(v => `<option value="${v.price}">${v.label}</option>`).join('')}
                </select>
                <span class="price-tag" id="price-${start + index}">${p.variants[0].price}</span>
                <button class="order-btn" onclick="order('${p.name}')">طلب واتساب</button>
            </div>
        `).join('');
        updatePagination(items.length);
    }

    function updatePrice(selectElement, id) {
        document.getElementById(`price-${id}`).innerText = selectElement.value;
    }

    function updatePagination(total) {
        const pages = Math.ceil(total / itemsPerPage);
        const nav = document.getElementById('pagination');
        nav.innerHTML = '';
        if (pages <= 1) return;
        for(let i=1; i<=pages; i++) {
            nav.innerHTML += `<button class="page-btn ${i===currentPage?'active-page':''}" onclick="changePage(${i})">${i}</button>`;
        }
    }

    function changePage(i) { currentPage = i; render(i); window.scrollTo(0,0); }
    
    function search() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
        currentPage = 1;
        render(1, filtered);
    }

    function order(name) { window.open(`https://wa.me/201234567890?text=محتاج أطلب ${name}`, '_blank'); }

    render(1);
</script>
</body>
</html>
