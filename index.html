<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAKER - مكتبة ذاكر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2c3e50; --s: #3498db; --a: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, var(--p), var(--s)); color: #fff; padding: 15px; text-align: center; }
        .logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; background: #fff; margin-bottom: 5px; }
        .container { padding: 10px; max-width: 1000px; margin: auto; }
        .category-title { border-right: 4px solid var(--s); padding-right: 10px; margin: 15px 0; color: var(--p); font-size: 1.1rem; text-align: right; }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #fff; padding: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; }
        .img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 8px; border-radius: 8px; }
        .name { font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; min-height: 35px; color: #333; display: flex; align-items: center; justify-content: center; }
        .price { color: #27ae60; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .label { display: block; text-align: right; font-size: 0.7rem; margin-bottom: 2px; color: #666; font-weight: bold; }
        
        select { width: 100%; padding: 4px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 8px; font-family: 'Cairo'; font-size: 0.75rem; }
        .btn { background: var(--a); color: #fff; border: none; padding: 10px 2px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 0.8rem; text-decoration: none; margin-top: auto; }

        .pagination { display: flex; justify-content: center; gap: 5px; margin: 20px 0; flex-wrap: wrap; }
        .pagination button { background: #fff; border: 1px solid var(--s); color: var(--s); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; }
        .pagination button.active { background: var(--s); color: #fff; }

        .service-card { background: #fff; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; border-right: 5px solid var(--s); }
        .service-btn { background: var(--s); color: #fff; padding: 10px; border-radius: 8px; display: block; text-decoration: none; font-weight: bold; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/JjGYxZSd/logo.png" class="logo">
    <h1 style="font-size: 1.2rem; margin: 0;">مكتبة ذاكر - ZAKER</h1>
</header>

<div class="container">

    <div id="products-grid" class="product-grid"></div>
    <div id="pagination" class="pagination"></div>

    <h2 class="category-title">خدمات إضافية</h2>
    <div class="service-card">
        <div style="font-weight: bold; color: var(--p);">📸 تصوير ومستندات</div>
        <a href="https://wa.me/201027021011" class="service-btn">استفسار واتساب</a>
    </div>
</div>

        { name: "كشكول سلك ورقه 100 الحسام", img: "", variants: [{label: "كبير", price: "35"}] },
        { name: "كشكول سلك 100 ورقه امازون", img: "", variants: [{label: "عادي", price: "40"}] },
        { name: "كشكول سلك 80 ورقه", img: "", variants: [{label: "عادي", price: "32"}] },
        { name: "كشكول سلك صغير 100 ورقه", img: "", variants: [{label: "عادي", price: "30"}] },

        { name: "دبل فيس ابيض", img: "", variants: [{label: "عادي", price: "10"}] },
        { name: "مسدس شمع كبير", img: "", variants: [{label: "عادي", price: "125"}] }
    ];


    const itemsPerPage = 12;
    let currentPage = 1;

    function renderProducts(page) {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';
        const start = (page - 1) * itemsPerPage;
        const items = allProducts.slice(start, start + itemsPerPage);

        items.forEach((p, index) => {
            let selectBox = '';
            if(p.variants.length > 1) {
                selectBox = `<label class="label">اختر النوع:</label>
                             <select onchange="document.getElementById('p-${start+index}').innerText = this.value + ' ج.م'">
                                ${p.variants.map(v => `<option value="${v.price}">${v.label} - ${v.price}ج</option>`).join('')}
                             </select>`;
            }
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}" class="img">
                    <div class="name">${p.name}</div>
                    <div class="price" id="p-${start+index}">${p.variants[0].price} ج.م</div>
                    ${selectBox}
                    <button onclick="order('${p.name}', ${start+index})" class="btn">طلب واتساب</button>
                </div>`;
        });
        renderPagination();
    }

    function renderPagination() {
        const pages = Math.ceil(allProducts.length / itemsPerPage);
        const div = document.getElementById('pagination');
        div.innerHTML = '';
        for(let i=1; i<=pages; i++) {
            div.innerHTML += `<button class="${i===currentPage?'active':''}" onclick="currentPage=${i};renderProducts(${i});window.scrollTo(0,0)">${i}</button>`;
        }
    }

    function order(name, id) {
        let price = document.getElementById('p-'+id).innerText;
        let msg = encodeURIComponent("أهلاً مكتبة ذاكر، أريد طلب: " + name + " بسعر " + price);
        window.open("https://wa.me/201027021011?text=" + msg);
    }

    renderProducts(1);
</script>
</body>
</html>
